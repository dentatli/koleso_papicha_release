name: Build latest release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-latest
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run frontend logic tests
        shell: pwsh
        run: |
          node tests/ai_frontend_logic_tests.js
          if ($LASTEXITCODE -ne 0) {
            throw "Frontend logic tests failed."
          }

      - name: Run PowerShell logic tests
        shell: powershell
        run: |
          .\tests\ai_logic_tests.ps1

      - name: Run local server API contract tests
        shell: powershell
        run: |
          .\tests\runtime_api_tests.ps1

      - name: Build setup BAT
        shell: pwsh
        run: |
          ./build_release_single_bat.ps1

      - name: Check build output
        shell: pwsh
        run: |
          if (!(Test-Path "dist/PapichWheel_Setup.bat")) {
            throw "dist/PapichWheel_Setup.bat not found"
          }

          $size = (Get-Item "dist/PapichWheel_Setup.bat").Length
          if ($size -le 0) {
            throw "dist/PapichWheel_Setup.bat is empty"
          }

          Write-Host "PapichWheel_Setup.bat size: $size bytes"

      - name: Recreate latest release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete latest --yes --cleanup-tag
          } else {
            Write-Host "No existing latest release. Creating new one."
          }

          git tag -f latest $env:GITHUB_SHA
          git push origin refs/tags/latest --force

          @"
          Автоматическая сборка PapichWheel.

          Коммит: $env:GITHUB_SHA

          Как установить:
            1. Скачайте PapichWheel_Setup.bat.
            2. Поместите его в отдельную папку и запустите.
            3. После распаковки запустите start_koleso.bat.
            4. Работающий сервер отображается значком в системном трее.

          Как обновить:
            1. Закройте PapichWheel через значок в трее.
            2. Скачайте новый PapichWheel_Setup.bat.
            3. Поместите его рядом со start_koleso.bat и запустите.
            4. Снова запустите start_koleso.bat.

          Пользовательские данные и ключи хранятся отдельно и при обновлении не удаляются.
          "@ | Set-Content -LiteralPath "release-notes.md" -Encoding utf8

          gh release create latest `
            "dist/PapichWheel_Setup.bat" `
            --target $env:GITHUB_SHA `
            --title "PapichWheel latest" `
            --notes-file "release-notes.md"