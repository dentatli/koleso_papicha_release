name: Build latest release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-latest
  cancel-in-progress: false

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Run frontend logic tests
        shell: pwsh
        run: |
          node tests/ai_frontend_logic_tests.js
          if ($LASTEXITCODE -ne 0) {
            throw "Frontend logic tests failed."
          }

          node tests/ai_tester_logic_tests.js
          if ($LASTEXITCODE -ne 0) {
            throw "AI tester logic tests failed."
          }

          node tests/random_logic_tests.js
          if ($LASTEXITCODE -ne 0) {
            throw "Random logic tests failed."
          }

      - name: Run PowerShell logic tests
        shell: powershell
        run: |
          .\tests\ai_logic_tests.ps1

      - name: Run local server API contract tests
        shell: powershell
        run: |
          .\tests\runtime_api_tests.ps1

      - name: Run isolated AI tester server tests
        shell: powershell
        run: |
          .\tests\ai_tester_server_tests.ps1

  build-release:
    needs: verify
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Build setup BAT
        shell: pwsh
        run: |
          ./build_release_single_bat.ps1

      - name: Check build output
        shell: pwsh
        run: |
          if (!(Test-Path "dist/PapichWheel_Setup.bat")) {
            throw "dist/PapichWheel_Setup.bat not found"
          }

          $size = (Get-Item "dist/PapichWheel_Setup.bat").Length
          if ($size -le 0) {
            throw "dist/PapichWheel_Setup.bat is empty"
          }

          Write-Host "PapichWheel_Setup.bat size: $size bytes"

          $hash = (Get-FileHash -LiteralPath "dist/PapichWheel_Setup.bat" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  PapichWheel_Setup.bat" | Set-Content -LiteralPath "dist/PapichWheel_Setup.bat.sha256" -Encoding ascii

      - name: Update latest release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          git tag -f latest $env:GITHUB_SHA
          if ($LASTEXITCODE -ne 0) { throw "Could not update local latest tag." }
          git push origin refs/tags/latest --force
          if ($LASTEXITCODE -ne 0) { throw "Could not push latest tag." }

          @"
          Автоматическая сборка PapichWheel.

          Коммит: $env:GITHUB_SHA

          Как установить:
            1. Скачайте PapichWheel_Setup.bat.
            2. Поместите его в отдельную папку и запустите.
            3. После распаковки запустите start_koleso.bat.
            4. Работающий сервер отображается значком в системном трее.

          Как обновить:
            1. Закройте PapichWheel через значок в трее.
            2. Скачайте новый PapichWheel_Setup.bat.
            3. Поместите его рядом со start_koleso.bat и запустите.
            4. Снова запустите start_koleso.bat.

          Пользовательские данные и ключи хранятся отдельно и при обновлении не удаляются.
          "@ | Set-Content -LiteralPath "release-notes.md" -Encoding utf8

          if ($releaseExists) {
            gh release edit latest `
              --target $env:GITHUB_SHA `
              --title "PapichWheel latest" `
              --notes-file "release-notes.md"
            if ($LASTEXITCODE -ne 0) { throw "Could not update latest release metadata." }
            gh release upload latest `
              "dist/PapichWheel_Setup.bat" `
              "dist/PapichWheel_Setup.bat.sha256" `
              --clobber
            if ($LASTEXITCODE -ne 0) { throw "Could not upload latest release assets." }
          } else {
            gh release create latest `
              "dist/PapichWheel_Setup.bat" `
              "dist/PapichWheel_Setup.bat.sha256" `
              --target $env:GITHUB_SHA `
              --title "PapichWheel latest" `
              --notes-file "release-notes.md"
            if ($LASTEXITCODE -ne 0) { throw "Could not create latest release." }
          }
